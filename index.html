<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Llanelli Town Academy Performance Dashboard</title>

<style>
body { font-family: Arial; background:#f4f6f9; text-align:center; }
#loginBox { margin-top:150px; }
input { padding:10px; }
button { padding:10px 20px; cursor:pointer; }
#app { display:none; }
.container { max-width:1200px; margin:auto; padding:40px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const APP_PASSWORD = "Llanelli25";

function checkPassword() {
    const input = document.getElementById("passwordInput").value;
    if (input === APP_PASSWORD) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("app").style.display = "block";
    } else {
        alert("Incorrect password.");
    }
}

</script>
</head>

<body>

<div id="loginBox">
<h2>Llanelli Town Academy Performance Dashboard</h2>
<p>Please enter password to access.</p>
<input type="password" id="passwordInput" placeholder="Enter Password">
<button onclick="checkPassword()">Access Dashboard</button>
</div>

<div id="app">
<div class="container">
<h1>Llanelli Town Academy Performance Dashboard</h1>
<p>This is your fully embedded performance system.</p>

<canvas id="demoChart"></canvas>

<script>
const ctx = document.getElementById('demoChart');
new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Example Athlete A', 'Example Athlete B'],
        datasets: [{
            label: '30m Sprint (m/s)',
            data: [6.8, 7.1]
        }]
    }
});
</script>

</div>
</div>

</body>
</html>
